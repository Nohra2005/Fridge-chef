name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Gemini API key from secret
        run: |
          if [ -z "${{ secrets.GEMINI_KEY }}" ]; then
            echo "::error::GEMINI_KEY secret is not set. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          sed -i "s|__GEMINI_KEY__|${{ secrets.GEMINI_KEY }}|g" index.html
          echo "Key injected."

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
